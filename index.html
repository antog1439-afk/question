<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Тест на знание</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        /* Прогресс-бар */
        .progress-container {
            background: var(--tg-theme-secondary-bg-color, #e0e0e0);
            border-radius: 10px;
            height: 8px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        
        .progress-bar {
            background: var(--tg-theme-button-color, #2481cc);
            width: 0%;
            height: 100%;
            transition: width 0.3s ease;
            border-radius: 10px;
        }
        
        /* Карточка вопроса */
        .question-card {
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }
        
        .question-text {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 24px;
            line-height: 1.3;
        }
        
        /* Варианты ответов */
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .option-btn {
            background: var(--tg-theme-bg-color, #ffffff);
            border: 1px solid var(--tg-theme-hint-color, #aaaaaa);
            border-radius: 12px;
            padding: 14px 20px;
            font-size: 16px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            color: var(--tg-theme-text-color, #000000);
        }
        
        .option-btn:hover {
            background: var(--tg-theme-button-color, #2481cc);
            color: white;
            border-color: var(--tg-theme-button-color, #2481cc);
        }
        
        .option-btn.correct-highlight {
            background: #4caf50;
            color: white;
            border-color: #4caf50;
        }
        
        .option-btn.wrong-highlight {
            background: #f44336;
            color: white;
            border-color: #f44336;
        }
        
        .option-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        /* Кнопка "Далее" */
        .next-btn {
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 12px;
            padding: 16px 24px;
            font-size: 18px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 16px;
            transition: opacity 0.2s;
        }
        
        .next-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Результат */
        .result-card {
            text-align: center;
            padding: 32px 24px;
        }
        
        .score {
            font-size: 64px;
            font-weight: bold;
            margin: 20px 0;
        }
        
        .result-message {
            font-size: 18px;
            margin-bottom: 30px;
        }
        
        .restart-btn {
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 12px;
            padding: 14px 28px;
            font-size: 16px;
            cursor: pointer;
        }
        
        /* Индикатор номера вопроса */
        .question-counter {
            text-align: center;
            color: var(--tg-theme-hint-color, #888888);
            margin-bottom: 16px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <div id="app">
            <!-- Сюда будет загружаться контент -->
        </div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand();  // Растягиваем на весь экран
        tg.enableClosingConfirmation();  // Подтверждение при закрытии
        
        // Ваши вопросы и ответы (те же, что и в предыдущем боте)
        const QUIZ = [
            { question: "В каком году я родился?", correct: "2006", options: ["2006", "2003", "1997"] },
            { question: "Какого числа я родился?", correct: "6", options: ["6", "10", "1"] },
            { question: "Мой любимый цвет?", correct: "Белый", options: ["Белый", "Красный", "Коричневый"] },
            { question: "Мой любимый исполнитель?", correct: "Асия", options: ["Асия", "Мари Краймбери", "Оба варианта верны"] },
            { question: "Первая машина для накопления опыта?", correct: "RENAULT", options: ["RENAULT", "FORD", "SKODA"] },
            { question: "Моя любимая книга?", correct: "Таинственный остров", options: ["Таинственный остров", "Война и Мир", "Евгений Онегин"] },
            { question: "Мой любимый писатель?", correct: "Жюль Верн", options: ["Жюль Верн", "Александр Пушкин", "Вильям Шекспир"] },
            { question: "Самый лучший враг Антона?", correct: "Милана", options: ["Милана", "Даша", "Диана"] },
            { question: "В каком году и числа получил первую профессию?", correct: "28 мая 2024 года", options: ["28 мая 2024 года", "6 сентября 2025 года", "24 апреля 2023"] },
            { question: "В каком году и числа получил вторую профессию?", correct: "6 февраля 2026 года", options: ["6 февраля 2026 года", "17 мая 2026 года", "6 апреля 2026 года"] },
            { question: "Моя лучшая сестра?", correct: "Маргарита", options: ["Маргарита", "Вика", "Катя"] }
        ];
        
        let currentIndex = 0;
        let score = 0;
        let answerLocked = false;
        let selectedAnswer = null;
        
        function updateProgress() {
            const percent = (currentIndex / QUIZ.length) * 100;
            document.getElementById('progressBar').style.width = percent + '%';
        }
        
        function showResult() {
            const percent = Math.round((score / QUIZ.length) * 100);
            let message = '';
            
            if (percent === 100) {
                message = '🎉 Идеально! Ты знаешь меня на все 100%!';
            } else if (percent >= 70) {
                message = '👍 Отлично! Ты хорошо меня знаешь.';
            } else if (percent >= 40) {
                message = '🤔 Неплохо, но есть куда расти.';
            } else {
                message = '😅 Нам нужно больше общаться!';
            }
            
            document.getElementById('app').innerHTML = `
                <div class="result-card">
                    <h2>🎯 Тест завершён!</h2>
                    <div class="score">${score} / ${QUIZ.length}</div>
                    <div class="score" style="font-size: 32px;">${percent}%</div>
                    <div class="result-message">${message}</div>
                    <button class="restart-btn" onclick="restartQuiz()">🔄 Пройти заново</button>
                    <button class="restart-btn" style="margin-top: 12px; background: var(--tg-theme-hint-color);" onclick="tg.close()">❌ Закрыть</button>
                </div>
            `;
            
            // Отправляем результат в Telegram (опционально)
            tg.sendData(JSON.stringify({ score: score, total: QUIZ.length, percent: percent }));
        }
        
        function showQuestion() {
            updateProgress();
            const question = QUIZ[currentIndex];
            const counter = `${currentIndex + 1} из ${QUIZ.length}`;
            
            let optionsHtml = '';
            // Перемешиваем варианты ответов
            const shuffled = [...question.options];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            
            shuffled.forEach(opt => {
                optionsHtml += `<button class="option-btn" onclick="checkAnswer('${opt.replace(/'/g, "\\'")}')">${opt}</button>`;
            });
            
            document.getElementById('app').innerHTML = `
                <div class="question-counter">${counter}</div>
                <div class="question-card">
                    <div class="question-text">${question.question}</div>
                    <div class="options" id="optionsContainer">
                        ${optionsHtml}
                    </div>
                    <button class="next-btn" id="nextBtn" disabled onclick="nextQuestion()">Дальше →</button>
                </div>
            `;
            
            answerLocked = false;
            selectedAnswer = null;
        }
        
        function checkAnswer(selected) {
            if (answerLocked) return;
            
            const question = QUIZ[currentIndex];
            const isCorrect = (selected === question.correct);
            
            if (isCorrect) {
                score++;
            }
            
            answerLocked = true;
            selectedAnswer = selected;
            
            // Подсвечиваем правильные/неправильные ответы
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => {
                btn.disabled = true;
                if (btn.textContent === question.correct) {
                    btn.classList.add('correct-highlight');
                }
                if (btn.textContent === selected && !isCorrect) {
                    btn.classList.add('wrong-highlight');
                }
            });
            
            // Активируем кнопку "Далее"
            document.getElementById('nextBtn').disabled = false;
            
            // Вибрация при ответе (если поддерживается)
            if (tg.HapticFeedback) {
                if (isCorrect) {
                    tg.HapticFeedback.notificationOccurred('success');
                } else {
                    tg.HapticFeedback.notificationOccurred('error');
                }
            }
        }
        
        function nextQuestion() {
            currentIndex++;
            if (currentIndex < QUIZ.length) {
                showQuestion();
            } else {
                showResult();
            }
        }
        
        function restartQuiz() {
            currentIndex = 0;
            score = 0;
            answerLocked = false;
            selectedAnswer = null;
            showQuestion();
        }
        
        // Запускаем тест
        showQuestion();
        
        // Настраиваем главную кнопку Telegram (если нужно)
        tg.MainButton.setText("Тест на знание");
        tg.MainButton.show();
        tg.MainButton.onClick(() => {
            if (currentIndex < QUIZ.length && answerLocked) {
                nextQuestion();
            }
        });
    </script>
</body>
</html>
